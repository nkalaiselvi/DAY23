<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Profile Card</title>
</head>
<body>
     <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 30px;
        }

        .card {
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 2px solid rgb(60, 203, 239);
            border-radius: 10px;
            box-shadow: 2px 2px 8px gray;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;    /* Makes the image round */
            border: 3px solid rgb(229, 166, 249);
        }
    </style>
</head>
<body>

<h2>Dynamic Profile Card</h2>

<br><button onclick="showProfile()">Show Profile</button>
<br><br>

<div id="profile"></div>
<br>

<script>

function showProfile() {

    let name = "Kalai";
    let age = 22;
    let city = "Chennai";

    let profile = document.getElementById("profile");

    let card = document.createElement("div");
    card.className = "card";

    card.innerHTML =
        '<img src="profile.jpg" class="profile-img"><br><br>' +
        "<b>Name:</b> " + name + "<br><br>" +
        "<b>Age:</b> " + age + "<br><br>" +
        "<b>City:</b> " + city;

    profile.innerHTML = "";
    profile.appendChild(card);
}

</script>

</body>
</html>
